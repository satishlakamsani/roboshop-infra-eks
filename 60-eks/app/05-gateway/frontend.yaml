apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: frontend-tgconfig
  namespace: roboshop
spec:
  targetReference:
    name: frontend
    kind: Service
  defaultConfiguration:
    targetType: ip
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: roboshop
spec:
  parentRefs:
  - name: roboshop-gateway
    sectionName: https
  hostnames:
  - "roboshop-dev.daws88s.online"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80